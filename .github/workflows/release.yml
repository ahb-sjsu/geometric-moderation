name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    # Uses PyPI trusted publishing — configure a publisher on PyPI for
    # this project with workflow filename "release.yml", environment blank.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade build
      - name: Build sdist + wheel
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
